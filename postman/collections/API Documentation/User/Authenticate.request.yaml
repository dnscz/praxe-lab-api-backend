$kind: http-request
url: "{{baseUrl}}/login"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |-
    {
      "email": "user89@example.com",
      "password": "stringst"
    }
scripts:
  - type: afterResponse
    code: |
      const json = pm.response.json();

      // Store token in collection scope (not global)
      pm.collectionVariables.set("access_token", json.data.token);
    language: text/javascript
examples: ./.resources/Authenticate.resources/examples
order: 2000
