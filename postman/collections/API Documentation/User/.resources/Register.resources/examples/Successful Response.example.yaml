$kind: http-example
request:
  url: "{{baseUrl}}/register"
  method: POST
  headers:
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "first_name": "string",
        "last_name": "string",
        "email": "user89@example.com",
        "password": "stringst",
        "password_confirmation": "stringst"
      }
